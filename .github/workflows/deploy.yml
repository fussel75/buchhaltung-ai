name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy trigger
        shell: bash
        env:
          SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -eo pipefail

          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
              break
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "ssh-keyscan failed after 5 attempts."
              exit 1
            fi

            echo "ssh-keyscan failed. Retrying in 5s (${attempt}/5)..."
            sleep 5
          done

          ssh_options=(
            -i ~/.ssh/id_ed25519
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=2
            -o StrictHostKeyChecking=yes
          )

          for attempt in 1 2 3 4 5; do
            set +e
            ssh "${ssh_options[@]}" "root@$SSH_HOST"
            status="$?"
            set -e

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if [ "$status" -ne 255 ]; then
              echo "Remote deploy failed with exit code ${status}; not retrying."
              exit "$status"
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "SSH connection failed after 5 attempts."
              exit 255
            fi

            echo "SSH connection failed. Retrying in 10s (${attempt}/5)..."
            sleep 10
          done
