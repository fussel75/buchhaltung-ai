name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy trigger
        env:
          SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail

          retry() {
            local attempts="$1"
            local delay="$2"
            shift 2

            for attempt in $(seq 1 "$attempts"); do
              if "$@"; then
                return 0
              fi

              if [ "$attempt" -eq "$attempts" ]; then
                echo "Command failed after $attempts attempts: $*"
                return 1
              fi

              echo "Command failed. Retrying in ${delay}s (${attempt}/${attempts})..."
              sleep "$delay"
            done
          }

          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          retry 5 5 bash -c 'ssh-keyscan -H "$1" >> ~/.ssh/known_hosts' _ "$SSH_HOST"
          retry 5 10 ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=2 -o StrictHostKeyChecking=yes "root@$SSH_HOST"
