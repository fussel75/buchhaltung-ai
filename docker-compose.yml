services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buchhaltung_ai}
      POSTGRES_USER: ${POSTGRES_USER:-buchhaltung}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buchhaltung} -d ${POSTGRES_DB:-buchhaltung_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://buchhaltung:change-me@db:5432/buchhaltung_ai}
      STORAGE_ROOT: /data/storage
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./storage:/data/storage
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${WEB_API_BASE_URL:-/api}
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
